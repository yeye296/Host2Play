name: Host2Play 续期

on:
  schedule:
    - cron: '0 8 */2 * *'
    # - cron: '0 0,11,22 * * *'
    # - cron: '30 5,16 * * *'

  workflow_dispatch:
    inputs:
      retry:
        description: "Retry Count"
        required: false
        default: "0"

permissions:
  contents: write
  actions: write   # ✅ 关键修复

concurrency:
  group: host2play-renew
  cancel-in-progress: false

jobs:

  run-renew:
    name: 执行脚本
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb ffmpeg unzip curl wget jq ca-certificates \
            fonts-liberation libasound2t64 libatk-bridge2.0-0t64 \
            libatk1.0-0t64 libc6 libcairo2 libcups2t64 libdbus-1-3 \
            libexpat1 libfontconfig1 libgbm1 libgcc-s1 \
            libglib2.0-0t64 libgtk-3-0t64 libnspr4 libnss3 \
            libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 \
            libx11-6 libx11-xcb1 libxcb1 libxcomposite1 \
            libxcursor1 libxdamage1 libxext6 libxfixes3 \
            libxi6 libxrandr2 libxrender1 libxss1 libxtst6 xdg-utils

      - name: 安装 Google Chrome
        run: |
          wget -q -O /tmp/google-chrome.deb \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome.deb || sudo apt-get install -fy
          google-chrome --version

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            DrissionPage==4.1.0.18 \
            DataRecorder==3.6.2 \
            DownloadKit requests lxml cssselect \
            websocket-client psutil xvfbwrapper \
            SpeechRecognition pydub

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" \
            | sudo tee /etc/resolv.conf

      - name: 创建输出目录
        run: mkdir -p output/screenshots

      - name: 执行续订
        timeout-minutes: 30
        env:
          PYTHONUNBUFFERED: 1
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      # --- 新增的防暂停代码开始 ---
      - name: Commit time.txt to repo
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 如果 time.txt 不存在，说明是第一次运行
          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi
          
          git add time.txt
          
          # 如果有更改再提交
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
      # --- 新增的防暂停代码结束 ---

      - name: Commit time.txt to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add time.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "⏱️ 更新时间文件"
          git pull --rebase origin main || true
          git push origin HEAD:main

      # - name: 清理历史运行记录
      #   if: always()
      #   uses: Mattraks/delete-workflow-runs@v2
      #   with:
      #     token: ${{ github.token }}
      #     repository: ${{ github.repository }}
      #     delete_workflow_pattern: ${{ github.workflow }}
      #     retain_days: 0
      #     keep_minimum_runs: 5

  rerun-workflow:
    name: 自动重启工作流
    needs: run-renew
    if: ${{ always() && needs.run-renew.result == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: 重新触发自己
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const retry = Number('${{ github.event.inputs.retry || 0 }}');

            console.log(`当前重试次数: ${retry}`);

            if (retry >= 3) {
              console.log("达到最大重试次数");
              return;
            }
             
            const workflowFile = "Host2Play_Renew.yml"; 

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowFile,  // ✅ 更稳
              ref: context.ref.replace('refs/heads/', ''),
              inputs: {
                retry: String(retry + 1)
              }
            });

            console.log(`已触发新的 Workflow，重试次数 ${retry + 1}`);
